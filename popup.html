<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shorts Remover</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      width: 240px;
      font-family: "Roboto", Arial, sans-serif;
      background: #fff;
      color: #0f0f0f;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #212121; color: #f1f1f1; }
    }
    .wrap { padding: 16px; }
    .title { font-size: 14px; font-weight: 600; margin: 0 0 2px; }
    .subtitle { font-size: 12px; opacity: 0.7; margin: 0 0 14px; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .label { font-size: 13px; }
    /* Toggle switch */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #ccc; border-radius: 24px; transition: 0.2s;
    }
    .slider::before {
      content: ""; position: absolute; height: 18px; width: 18px;
      left: 3px; bottom: 3px; background: #fff; border-radius: 50%;
      transition: 0.2s;
    }
    input:checked + .slider { background: #cc0000; }
    input:checked + .slider::before { transform: translateX(20px); }
    .status { margin-top: 12px; font-size: 12px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="title">Shorts &amp; Playables Remover</p>
    <p class="subtitle">Hides Shorts &amp; Playables on YouTube.</p>
    <div class="row">
      <span class="label">Enabled</span>
      <label class="switch">
        <input type="checkbox" id="toggle" />
        <span class="slider"></span>
      </label>
    </div>
    <p class="status" id="status">Loading…</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
